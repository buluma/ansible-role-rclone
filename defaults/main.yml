---
install_manpages: true
rclone_arch: amd64
rclone_config_location: /root/.config/rclone/rclone.conf
rclone_man_pages:
  GROUP: root
  OWNER: root
rclone_packages:
  - unzip
rclone_release: stable
rclone_setup_tmp_dir: /tmp/rclone_setup
rclone_version: '{{ ansible_local.rclone.version | d("0.0.0") }}'
